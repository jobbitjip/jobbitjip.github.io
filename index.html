<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jip Sterling's International Sadness</title>
    <style>
        /* The foundation: pitch black background */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; 
            min-height: 120vh; /* This creates the extra 'scroll' room you wanted */
        }

        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 5px;    /* Black space at the top */
            padding-bottom: 50px; /* Black space at the bottom */
        }

        .bg-image {
            width: 100%;
            height: auto;
            max-width: 100%;
            background-image: url('logo.jpg'); /* UPDATE THIS */
            background-repeat: no-repeat;
            
            /* Laptop / MacBook Settings */
            aspect-ratio: 16 / 9; /* Keeps the proportions like a film */
            background-size: contain; /* Ensures the whole image fits without cutting the top */
            background-position: center top;
        }

        /* Phone / Mobile Settings */
        @media (max-width: 768px) {
    body, html {
        min-height: 100%; /* Keeps it from over-scrolling on small screens */
        overflow-y: scroll; 
    }
    
    .image-container {
        padding-top: 0px; /* Shorter gap at the top for phones */
        display: block;    /* Changes how it sits on the screen */
    }

    .bg-image {
        /* This is the magic number: 100% means "fit the width of my phone exactly" */
        background-size: 100% auto; 
        background-position: center top;
        
        /* This ensures the image shape stays true and doesn't stretch */
        aspect-ratio: auto; 
        height: 60vh; /* Adjust this if you want the image taller or shorter on the phone */
    }
}
        /* Styling for the button */
.enter-button-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 40px; /* Space between image and button */
    padding-bottom: 100px; /* Extra black space at the very bottom */
}

.enter-button {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 15px 40px;
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    letter-spacing: 0.4em; /* This gives it that 'International Sadness' wide look */
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.6s ease;
}

.enter-button:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: #fff;
    letter-spacing: 0.5em;
}
        /* This creates the 'ghostly' fade-in effect */
@keyframes fadeIn {
    from { opacity: 0; filter: blur(5px); }
    to { opacity: 1; filter: blur(0px); }
}

/* This applies it to the button and the image */
.bg-image, .enter-button {
    animation: fadeIn 2.5s ease-out forwards;
}

/* We want the button to wait a second so the image has its moment first */
.enter-button {
    animation-delay: 1.2s;
    opacity: 0; /* Starts invisible */
}

    </style>
</head>
<body>

    <div class="image-container">
        <div class="bg-image"></div>
    </div>
    <div class="enter-button-container">
    <a href="#" class="enter-button">ENTER THE SADNESS</a>
</div>

</body>
</html>
