<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jip Sterling's International Sadness</title>
    <style>
        /* The foundation: pitch black background */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; 
            min-height: 120vh; /* This creates the extra 'scroll' room you wanted */
        }

        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 5px;    /* Black space at the top */
            padding-bottom: 50px; /* Black space at the bottom */
        }

        .bg-image {
            width: 100%;
            height: auto;
            max-width: 100%;
            background-image: url('logo.jpg'); /* UPDATE THIS */
            background-repeat: no-repeat;
            
            /* Laptop / MacBook Settings */
            aspect-ratio: 16 / 9; /* Keeps the proportions like a film */
            background-size: contain; /* Ensures the whole image fits without cutting the top */
            background-position: center top;
        }

        /* Phone / Mobile Settings */
        @media (max-width: 768px) {
    body, html {
        min-height: 100%; /* Keeps it from over-scrolling on small screens */
        overflow-y: scroll; 
    }
    
    .image-container {
        padding-top: 5px; /* Shorter gap at the top for phones */
        display: block;    /* Changes how it sits on the screen */
    }

    .bg-image {
        /* This is the magic number: 100% means "fit the width of my phone exactly" */
        background-size: 100% auto; 
        background-position: center top;
        
        /* This ensures the image shape stays true and doesn't stretch */
        aspect-ratio: auto; 
        height: 60vh; /* Adjust this if you want the image taller or shorter on the phone */
    }
}
    </style>
</head>
<body>

    <div class="image-container">
        <div class="bg-image"></div>
    </div>

</body>
</html>
